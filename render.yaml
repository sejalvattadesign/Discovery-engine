# Render Blueprint — deploys the FastAPI RAG backend (api/server.py).
# In Render: New + → "Blueprint" → point at this repo → it reads this file.
# Set the two secret env vars in the dashboard (they are sync:false = not in git).
services:
  - type: web
    name: detour-rag-backend
    runtime: python
    plan: free                       # 512 MB RAM — see the memory note in DEPLOYMENT.md
    rootDir: .                       # run from repo root (api.server imports app/ + reads data/chroma)
    # Install serve-layer deps, then pre-cache the MiniLM model so the first
    # question isn't slowed by a cold model download.
    buildCommand: >-
      pip install -r requirements-api.txt &&
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY            # set in Render dashboard (rotate the old key first)
        sync: false
      - key: ANTHROPIC_API_KEY       # optional fallback provider
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
